<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="64" height="64">
  <style>
    @keyframes tetris-block {
      0%, 100% { fill: rgba(21, 145, 220, 0.1); transform: scale(0.9); }
      15% { fill: #1591dc; transform: scale(1.05); filter: drop-shadow(0 0 3px rgba(21,145,220,0.8)); }
      30% { fill: #2c5ead; transform: scale(1); }
      60% { fill: rgba(21, 145, 220, 0.15); }
    }
    .block {
      width: 8px;
      height: 8px;
      rx: 1.5px;
      transform-origin: center;
      animation: tetris-block 3.5s infinite ease-in-out;
    }
    /* Set custom transform origins for scale center alignment */
    #b00 { transform-origin: 9px 9px; animation-delay: 0.1s; }
    #b01 { transform-origin: 19px 9px; animation-delay: 0.2s; }
    #b02 { transform-origin: 29px 9px; animation-delay: 0.3s; }
    #b03 { transform-origin: 39px 9px; animation-delay: 0.4s; }
    #b04 { transform-origin: 49px 9px; animation-delay: 0.5s; }

    #b10 { transform-origin: 9px 19px; animation-delay: 0.8s; }
    #b11 { transform-origin: 19px 19px; animation-delay: 0.7s; }
    #b12 { transform-origin: 29px 19px; animation-delay: 0.4s; }
    #b13 { transform-origin: 39px 19px; animation-delay: 0.5s; }
    #b14 { transform-origin: 49px 19px; animation-delay: 0.6s; }

    #b20 { transform-origin: 9px 29px; animation-delay: 0.9s; }
    #b21 { transform-origin: 19px 29px; animation-delay: 0.2s; }
    #b22 { transform-origin: 29px 29px; animation-delay: 0.0s; }
    #b23 { transform-origin: 39px 29px; animation-delay: 0.7s; }
    #b24 { transform-origin: 49px 29px; animation-delay: 0.7s; }

    #b30 { transform-origin: 9px 39px; animation-delay: 1.0s; }
    #b31 { transform-origin: 19px 39px; animation-delay: 0.3s; }
    #b32 { transform-origin: 29px 39px; animation-delay: 0.8s; }
    #b33 { transform-origin: 39px 39px; animation-delay: 0.9s; }
    #b34 { transform-origin: 49px 39px; animation-delay: 0.8s; }

    #b40 { transform-origin: 9px 49px; animation-delay: 1.1s; }
    #b41 { transform-origin: 19px 49px; animation-delay: 1.2s; }
    #b42 { transform-origin: 29px 49px; animation-delay: 1.3s; }
    #b43 { transform-origin: 39px 49px; animation-delay: 1.4s; }
    #b44 { transform-origin: 49px 49px; animation-delay: 1.5s; }
  </style>

  <!-- Background Grid -->
  <g>
    <!-- Row 0 -->
    <rect id="b00" class="block" x="5" y="5" />
    <rect id="b01" class="block" x="15" y="5" />
    <rect id="b02" class="block" x="25" y="5" />
    <rect id="b03" class="block" x="35" y="5" />
    <rect id="b04" class="block" x="45" y="5" />

    <!-- Row 1 -->
    <rect id="b10" class="block" x="5" y="15" />
    <rect id="b11" class="block" x="15" y="15" />
    <rect id="b12" class="block" x="25" y="15" />
    <rect id="b13" class="block" x="35" y="15" />
    <rect id="b14" class="block" x="45" y="15" />

    <!-- Row 2 -->
    <rect id="b20" class="block" x="5" y="25" />
    <rect id="b21" class="block" x="15" y="25" />
    <rect id="b22" class="block" x="25" y="25" />
    <rect id="b23" class="block" x="35" y="25" />
    <rect id="b24" class="block" x="45" y="25" />

    <!-- Row 3 -->
    <rect id="b30" class="block" x="5" y="35" />
    <rect id="b31" class="block" x="15" y="35" />
    <rect id="b32" class="block" x="25" y="35" />
    <rect id="b33" class="block" x="35" y="35" />
    <rect id="b34" class="block" x="45" y="35" />

    <!-- Row 4 -->
    <rect id="b40" class="block" x="5" y="45" />
    <rect id="b41" class="block" x="15" y="45" />
    <rect id="b42" class="block" x="25" y="45" />
    <rect id="b43" class="block" x="35" y="45" />
    <rect id="b44" class="block" x="45" y="45" />
  </g>
</svg>
