<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
  <style>
    @keyframes step-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; fill: #e8a55a; }
    }
    .node1 { transform-origin: 4px 18px; animation: step-pulse 1.8s infinite ease-in-out; }
    .node2 { transform-origin: 12px 10px; animation: step-pulse 1.8s infinite ease-in-out 0.6s; }
    .node3 { transform-origin: 20px 4px; animation: step-pulse 1.8s infinite ease-in-out 1.2s; }
    .line { stroke: #e8a55a; stroke-width: 2; fill: none; stroke-dasharray: 4; }
  </style>
  <path class="line" d="M4 18l8-8 8-6" />
  <circle class="node1" cx="4" cy="18" r="3" fill="#ccc" />
  <circle class="node2" cx="12" cy="10" r="3" fill="#ccc" />
  <circle class="node3" cx="20" cy="4" r="3" fill="#ccc" />
</svg>
